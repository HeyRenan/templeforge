name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22 }
      - name: unit suite
        run: node --test templeforge/scripts/__tests__/*.test.mjs
